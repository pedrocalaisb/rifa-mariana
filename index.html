<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa Solidária</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff7fb 0%, #fbeaf2 100%);
      text-align: center;
      color: #4b3b43;
    }

    .container {
      max-width: 920px;
      margin: auto;
      padding: 24px 16px 40px;
    }

    .topo {
      margin-bottom: 18px;
    }

    .titulo {
      color: #c94b86;
      font-size: 58px;
      margin: 0;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 0.95;
      text-shadow: 0 2px 8px rgba(201, 75, 134, 0.10);
    }

    .subtitulo {
      color: #e28eb3;
      font-size: 36px;
      margin: 0;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .sorteio {
      margin: 18px auto 0;
      padding: 10px 20px;
      border: 2px solid #edb2cc;
      border-radius: 999px;
      display: inline-block;
      color: #c96a97;
      background: #fff;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(201, 75, 134, 0.08);
    }

    .foto {
      width: 210px;
      height: 210px;
      object-fit: cover;
      border-radius: 26px;
      margin: 22px 0 18px;
      border: 5px solid #fff;
      box-shadow: 0 12px 30px rgba(201, 75, 134, 0.18);
    }

    .descricao
