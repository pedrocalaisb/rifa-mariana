<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Solidária</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 12px;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #fff8fb 0%, #f8eef3 100%);
  text-align: center;
  color: #4f3b46;
}

.container {
  max-width: 920px;
  margin: auto;
  padding: 20px 18px 40px;
}

.topo {
  margin-bottom: 10px;
}

.titulo {
  color: #c55489;
  font-size: 62px;
  margin: 0;
  font-weight: 800;
  letter-spacing: 1px;
  line-height: 0.95;
  text-shadow: 0 3px 10px rgba(197, 84, 137, 0.10);
}

.subtitulo {
  color: #df9abb;
  font-size: 38px;
  margin: 0;
  font-weight: 700;
  letter-spacing: 2px;
}

.sorteio {
  margin: 18px auto 0;
  padding: 12px 24px;
  border: 2px solid #e6b3cb;
  border-radius: 999px;
  display: inline-block;
  color: #c4729c;
  background: rgba(255,255,255,0.92);
  font-weight: 700;
  box-shadow: 0 8px 18px rgba(197, 84, 137, 0.08);
}

.foto {
  width: 210px;
  max-width: 100%;
  border-radius: 24px;
  margin: 22px 0 18px;
  object-fit: cover;
  border: 5px solid #fff;
  box-shadow: 0 14px 30px rgba(197, 84, 137, 0.18);
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 6px;
  margin-top: 22px;
  padding: 8px;
  background: rgba(240, 211, 223, 0.95);
  border-radius: 20px;
  box-shadow: 0 10px 24px rgba(180, 114, 156, 0.12);
}

.num {
  background: linear-gradient(180deg, #cb6794 0%, #bf5a88 100%);
  color: white;
  aspect-ratio: 1/1;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.18s ease;
  font-size: 16px;
  box-shadow: 0 4px 8px rgba(191, 90, 136, 0.18);
}

.num:hover {
  transform: scale(1.05);
}

.num.selecionado {
  background: linear-gradient(180deg, #914064 0%, #7d2d53 100%);
  transform: scale(1.08);
  box-shadow: 0 6px 12px rgba(125, 45, 83, 0.22);
}

.num.vendido {
  background: linear-gradient(180deg, #9e9e9e 0%, #7f7f7f 100%);
  cursor: not-allowed;
  box-shadow: none;
}

.premio {
  margin-top: 22px;
  background: linear-gradient(180deg, #cb6794 0%, #bf5a88 100%);
  color: white;
  padding: 22px;
  border-radius: 24px;
  box-shadow: 0 14px 28px rgba(191, 90, 136, 0.18);
}

.premio h2 {
  margin: 0 0 8px;
  font-size: 32px;
}

.premio p {
  margin: 0;
  font-size: 18px;
}

.acoes {
  background: rgba(255,255,255,0.96);
  margin-top: 18px;
  padding: 18px;
  border-radius: 24px;
  box-shadow: 0 12px 24px rgba(0,0,0,0.06);
}

#numeroEscolhido,
#valorTotal {
  font-weight: 700;
  color: #9a4d72;
}

#numeroEscolhido {
  margin-bottom: 8px;
}

#valorTotal {
  font-size: 20px;
  margin-top: 0;
}

.pix-texto {
  font-size: 17px;
  color: #5a4851;
}

.botao {
  margin-top: 12px;
  padding: 14px 16px;
  border: none;
  border-radius: 14px;
  width: 90%;
  max-width: 400px;
  font-weight: bold;
  font-size: 16px;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.botao:active {
  transform: scale(0.98);
}

.pix {
  background: linear-gradient(180deg, #cb6794 0%, #bf5a88 100%);
  color: white;
  box-shadow: 0 8px 16px rgba(191, 90, 136, 0.18);
}

.wpp {
  background: linear-gradient(180deg, #2dd66f 0%, #20b45c 100%);
  color: white;
  box-shadow: 0 8px 16px rgba(32, 180, 92, 0.20);
}

a {
  text-decoration: none;
}

@media (max-width: 700px) {
  .container {
    padding: 16px 10px 28px;
  }

  .titulo {
    font-size: 50px;
  }

  .subtitulo {
    font-size: 30px;
  }

  .sorteio {
    font-size: 16px;
    padding: 10px 18px;
  }

  .foto {
    width: 185px;
  }

  .num {
    font-size: 14px;
  }

  .premio h2 {
    font-size: 26px;
  }

  .premio p {
    font-size: 16px;
  }

  #valorTotal {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <h1 class="titulo">RIFA</h1>
    <h2 class="subtitulo">SOLIDÁRIA</h2>
    <div class="sorteio">Sorteio dia 20/05</div>
  </div>

  <img src="https://i.postimg.cc/43QvLLmb/b741eba1-94ca-428e-b642-eda879d57abc.jpg" class="foto" alt="Foto da rifa">

  <div id="grid" class="grid"></div>

  <div class="premio">
    <h2>PRÊMIO: R$200,00</h2>
    <p>R$5 por número</p>
  </div>

  <div class="acoes">
    <p id="numeroEscolhido">Nenhum número selecionado</p>
    <p id="valorTotal">Total: R$0,00</p>
    <p class="pix-texto">Pix: <b>27998162536</b></p>

    <button class="botao pix" onclick="copiarPix()">Copiar Pix</button>

    <a id="botaoWhatsapp" target="_blank">
      <button class="botao wpp">Enviar comprovante</button>
    </a>
  </div>

</div>

<script>
const grid = document.getElementById("grid");
const numeroEscolhido = document.getElementById("numeroEscolhido");
const valorTotal = document.getElementById("valorTotal");
const botaoWhatsapp = document.getElementById("botaoWhatsapp");

const numeroWhatsapp = "5527998162536";
const chavePix = "27998162536";
const valorPorNumero = 5;

// edite aqui os números vendidos
const vendidos = [];

let selecionados = [];

for (let i = 1; i <= 250; i++) {
  const botao = document.createElement("button");
  botao.className = "num";
  botao.innerText = i;

  if (vendidos.includes(i)) {
    botao.classList.add("vendido");
  }

  botao.onclick = () => {
    if (vendidos.includes(i)) return;

    if (selecionados.includes(i)) {
      selecionados = selecionados.filter(n => n !== i);
      botao.classList.remove("selecionado");
    } else {
      selecionados.push(i);
      selecionados.sort((a, b) => a - b);
      botao.classList.add("selecionado");
    }

    atualizarResumo();
  };

  grid.appendChild(botao);
}

function atualizarResumo() {
  if (selecionados.length === 0) {
    numeroEscolhido.innerText = "Nenhum número selecionado";
    valorTotal.innerText = "Total: R$0,00";
    botaoWhatsapp.href = "#";
    return;
  }

  const total = selecionados.length * valorPorNumero;

  numeroEscolhido.innerText =
    "Números escolhidos: " + selecionados.join(", ");

  valorTotal.innerText =
    "Total: R$" + total.toFixed(2).replace(".", ",");

  const mensagem =
    "Oi! Escolhi os números " +
    selecionados.join(", ") +
    " da rifa 💕 Total: R$" +
    total.toFixed(2).replace(".", ",") +
    ".";

  botaoWhatsapp.href =
    "https://wa.me/" + numeroWhatsapp +
    "?text=" + encodeURIComponent(mensagem);
}

function copiarPix() {
  navigator.clipboard.writeText(chavePix);
  alert("Pix copiado!");
}
</script>

</body>
</html>
