<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Solidária</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 10px;
  font-family: Arial, sans-serif;
  background: #f7f3f5;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px 20px 40px;
}

.titulo {
  color: #cc4f87;
  font-size: 60px;
  margin: 0;
}

.subtitulo {
  color: #e28cb2;
  font-size: 40px;
  margin: 0;
}

.sorteio {
  margin: 15px;
  padding: 10px 20px;
  border: 2px solid #e4a0bc;
  border-radius: 30px;
  display: inline-block;
  color: #c96a96;
  background: #fff;
}

.foto {
  width: 200px;
  border-radius: 20px;
  margin: 15px 0;
  max-width: 100%;
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 6px;
  margin-top: 20px;
  padding: 6px;
  background: #f0d3df;
  border-radius: 16px;
}

.num {
  background: #cc5a8c;
  color: white;
  aspect-ratio: 1/1;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 16px;
}

.num:hover {
  transform: scale(1.05);
}

.num.selecionado {
  background: #8f2e59;
  transform: scale(1.08);
}

.num.vendido {
  background: gray;
  cursor: not-allowed;
}

.premio {
  margin-top: 20px;
  background: #cc5a8c;
  color: white;
  padding: 20px;
  border-radius: 20px;
}

.acoes {
  background: white;
  margin-top: 15px;
  padding: 15px;
  border-radius: 20px;
}

.botao {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
  font-weight: bold;
}

.pix {
  background: #cc5a8c;
  color: white;
}

.wpp {
  background: #25D366;
  color: white;
}

#numeroEscolhido,
#valorTotal {
  font-weight: bold;
}

@media (max-width: 600px) {
  .container {
    padding: 16px 12px 30px;
  }

  .titulo {
    font-size: 48px;
  }

  .subtitulo {
    font-size: 32px;
  }

  .foto {
    width: 180px;
  }

  .num {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1 class="titulo">RIFA</h1>
<h2 class="subtitulo">SOLIDÁRIA</h2>

<div class="sorteio">Sorteio dia 20/05</div>

<img src="https://i.postimg.cc/43QvLLmb/b741eba1-94ca-428e-b642-eda879d57abc.jpg" class="foto" alt="Foto da rifa">

<div id="grid" class="grid"></div>

<div class="premio">
  <h2>PRÊMIO: R$200,00</h2>
  <p>R$5 por número</p>
</div>

<div class="acoes">
  <p id="numeroEscolhido">Nenhum número selecionado</p>
  <p id="valorTotal">Total: R$0,00</p>
  <p>Pix: <b>27998162536</b></p>

  <button class="botao pix" onclick="copiarPix()">Copiar Pix</button>

  <a id="botaoWhatsapp" target="_blank">
    <button class="botao wpp">Enviar comprovante</button>
  </a>
</div>

</div>

<script>
const grid = document.getElementById("grid");
const numeroEscolhido = document.getElementById("numeroEscolhido");
const valorTotal = document.getElementById("valorTotal");
const botaoWhatsapp = document.getElementById("botaoWhatsapp");

const numeroWhatsapp = "5527998162536";
const chavePix = "27998162536";
const valorPorNumero = 5;

// edite aqui os números vendidos
const vendidos = [];

let selecionados = [];

for (let i = 1; i <= 250; i++) {
  const botao = document.createElement("button");
  botao.className = "num";
  botao.innerText = i;

  if (vendidos.includes(i)) {
    botao.classList.add("vendido");
  }

  botao.onclick = () => {
    if (vendidos.includes(i)) return;

    if (selecionados.includes(i)) {
      selecionados = selecionados.filter(n => n !== i);
      botao.classList.remove("selecionado");
    } else {
      selecionados.push(i);
      selecionados.sort((a, b) => a - b);
      botao.classList.add("selecionado");
    }

    atualizarResumo();
  };

  grid.appendChild(botao);
}

function atualizarResumo() {
  if (selecionados.length === 0) {
    numeroEscolhido.innerText = "Nenhum número selecionado";
    valorTotal.innerText = "Total: R$0,00";
    botaoWhatsapp.href = "#";
    return;
  }

  const total = selecionados.length * valorPorNumero;

  numeroEscolhido.innerText =
    "Números escolhidos: " + selecionados.join(", ");

  valorTotal.innerText =
    "Total: R$" + total.toFixed(2).replace(".", ",");

  const mensagem =
    "Oi! Escolhi os números " +
    selecionados.join(", ") +
    " da rifa 💕 Total: R$" +
    total.toFixed(2).replace(".", ",") +
    ".";

  botaoWhatsapp.href =
    "https://wa.me/" + numeroWhatsapp +
    "?text=" + encodeURIComponent(mensagem);
}

function copiarPix() {
  navigator.clipboard.writeText(chavePix);
  alert("Pix copiado!");
}
</script>

</body>
</html>
